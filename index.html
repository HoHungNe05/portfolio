<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hồ Văn Hùng - Portfolio</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=1.1">
  <!-- Google Fonts: Outfit for general UI, Dancing Script for handwriting, Inter for details -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css?v=1.7">
</head>

<body>

  <!-- Top-left background index -->
  <div class="bg-index">01</div>



  <!-- Main Container -->
  <main class="dashboard-container">

    <!-- Left Sidebar -->
    <aside class="sidebar-left">
      <div class="sidebar-top">
        <div class="logo">
          <!-- Stylized H Logo -->
          <svg viewBox="0 0 100 100" class="logo-svg">
            <path d="M30,20 L42,80" stroke="currentColor" stroke-width="12" stroke-linecap="round" fill="none" />
            <path d="M58,20 L70,80" stroke="currentColor" stroke-width="12" stroke-linecap="round" fill="none" />
            <path d="M36,50 L64,50" stroke="var(--primary-color)" stroke-width="12" stroke-linecap="round" fill="none" />
          </svg>
        </div>

        <nav class="nav-menu">
          <a href="#" class="nav-item" title="Trang Chủ"><i data-lucide="home"></i></a>
          <a href="#" class="nav-item active" title="Star"><i data-lucide="star"></i></a>
          <a href="#" class="nav-item" title="Gallery"><i data-lucide="camera"></i></a>
          <a href="#" class="nav-item" title="Projects"><i data-lucide="briefcase"></i></a>
        </nav>
      </div>

      <div class="sidebar-mid">
        <div class="avatar-container">
          <img src="avatar.jpg" alt="Avatar" class="avatar-img">
        </div>
        <a href="#" class="nav-item" title="Analytics"><i data-lucide="trending-up"></i></a>
      </div>

      <div class="sidebar-bottom">
        <a href="https://www.facebook.com/vanhung.ho.75685962" target="_blank" class="nav-item" title="Facebook">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 2h-3a5 5 0 0 0 -5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z" />
          </svg>
        </a>
        <div class="nav-group-pills">
          <a href="https://www.tiktok.com/@hohungnek?_r=1&_t=ZS-971HAEjdiMu" target="_blank" class="nav-item" title="TikTok">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5" />
            </svg>
          </a>
          <a href="https://www.instagram.com/hungnek_05/" target="_blank" class="nav-item" title="Instagram">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
              <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
              <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
            </svg>
          </a>
        </div>
      </div>
    </aside>

    <!-- Center Section: Main Hero Card -->
    <section class="hero-section">
      <div class="photo-card-wrapper">
        <!-- Main Photo -->
        <img src="avatar.jpg" alt="Hồ Văn Hùng" class="main-hero-photo">

        <!-- Notches & Widgets Overlaid -->
        <!-- Top Left: Back to Home -->
        <div class="notch top-left-notch">
          <button class="btn-notch-action">
            <i data-lucide="skip-back" class="icon-small"></i>
            <span>Trang Chủ</span>
          </button>
        </div>


        <!-- Top Center: Interaction Counter -->
        <div class="notch top-center-notch">
          <div class="interaction-pill">
            <button class="interact-btn" id="dislike-btn">
              <span id="dislike-count">0</span>
              <i data-lucide="thumbs-down"></i>
            </button>
            <button class="interact-btn primary-glow" id="like-btn">
              <span id="like-count">0</span>
              <i data-lucide="heart" class="filled-heart"></i>
            </button>
            <button class="interact-btn" id="bell-btn">
              <i data-lucide="bell"></i>
            </button>
          </div>
        </div>

        <!-- Bottom Left: Birthday & Personal Info -->
        <div class="notch bottom-left-notch">
          <div class="personal-info-card">
            <div class="tag-row">
              <span class="info-pill-label">Họ Tên</span>
              <span class="info-pill-value">Hồ Văn Hùng</span>
            </div>

            <div class="birthday-container">
              <div class="birthday-label">Ngày Sinh</div>
              <div class="birthday-value">
                <span class="day">14</span>
                <span class="month-year">Tháng 5<br>2005</span>
              </div>
            </div>

            <div class="info-footer">
              <button class="info-circle-btn" title="About Me">
                <i data-lucide="info"></i>
              </button>
              <button class="action-pulse-btn" id="pulse-touch-btn" title="Interact">
                <i data-lucide="pointer"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Bottom Right: Accent Callout "Jazzlyn X Trisha" -->
        <div class="notch bottom-right-notch">
          <div class="callout-card">
            <h2 class="handwritten-title">Hồ Văn Hùng</h2>
            <div class="stats-row">
              <div class="stat-item">
                <i data-lucide="heart" class="icon-stat text-primary"></i>
                <span class="stat-number">0</span>
              </div>
              <div class="stat-item">
                <i data-lucide="star" class="icon-stat text-gold"></i>
                <span class="stat-number">0</span>
              </div>
              <div class="stat-item">
                <i data-lucide="bookmark" class="icon-stat text-blue"></i>
                <span class="stat-number">0</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </section>

    <!-- Right Sidebar: Widgets -->
    <aside class="sidebar-right">

      <!-- Hometown & Tags -->
      <div class="widget hometown-widget">
        <div class="widget-header">
          <h3>Quê Quán</h3>
          <div class="location-badge">
            <i data-lucide="map-pin"></i>
            <span>Quảng Trị, Việt Nam</span>
          </div>
        </div>
        <div class="tag-cloud">
          <span class="tag">Designer</span>
          <span class="tag">Rap</span>
          <span class="tag">Billiards</span>
        </div>
      </div>

      <!-- Music Player Widget -->
      <div class="widget music-widget">
        <div class="music-player-card">
          <div class="music-header">
            <div class="window-controls">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <button class="btn-more"><i data-lucide="more-horizontal"></i></button>
          </div>

          <div class="album-art-container">
            <div class="album-art-placeholder">
              <!-- Animated Audio Waveform -->
              <div class="waveform" id="waveform">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
              </div>
              <img src="leopard.png" alt="Album Art" class="album-art-img">
            </div>
          </div>

          <div class="track-details">
            <h4 class="track-title" id="track-name">UNhiddenGem Mixtape] 3. Cho Con</h4>
            <p class="track-artist">B Ray (Lullaby pt.2)</p>
          </div>

          <div class="player-progress">
            <div class="progress-bar-bg" id="progress-bar-container">
              <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
            <div class="time-row">
              <span id="current-time">0:00</span>
              <span id="total-time">3:45</span>
            </div>
          </div>

          <div class="player-controls">
            <button class="control-btn" id="prev-track"><i data-lucide="skip-back"></i></button>
            <button class="control-btn play-btn" id="play-pause-btn"><i data-lucide="play"></i></button>
            <button class="control-btn" id="next-track"><i data-lucide="skip-forward"></i></button>
          </div>
        </div>
      </div>

      <!-- Years Active Widget -->
      <div class="widget active-years-widget">
        <div class="active-years-content">
          <div class="years-text">
            <span class="widget-label">Hoạt Động</span>
            <div class="years-range">
              <span class="year-start">2026</span>
              <span class="year-dash">- Hiện Tại</span>
            </div>
          </div>
          <div class="clock-icon-container">
            <i data-lucide="clock" class="clock-icon"></i>
          </div>
        </div>
      </div>

      <!-- Media Section -->
      <div class="widget media-widget">
        <div class="media-header">
          <h3>Media</h3>
          <div class="carousel-arrows">
            <button class="arrow-btn" id="media-prev"><i data-lucide="chevron-left"></i></button>
            <button class="arrow-btn" id="media-next"><i data-lucide="chevron-right"></i></button>
          </div>
        </div>
        <div class="media-carousel-container">
          <div class="media-crop-frame">
            <img src="media1.jpg" alt="Hồ Văn Hùng Media" class="media-carousel-img" id="media-img">
          </div>
        </div>
      </div>

    </aside>

  </main>



  <!-- Image Modal / Lightbox -->
  <div id="image-modal" class="image-modal">
    <span class="modal-close">&times;</span>
    <img class="modal-content" id="modal-img-large" alt="Large View">
  </div>

  <div id="youtube-player" style="display: none;"></div>
  <script src="script.js?v=1.7"></script>
</body>

</html>
